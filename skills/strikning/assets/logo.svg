<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <style>
      .yarn { fill: #8b1a1a; }
      .yarn-light { fill: #c75c1c; }
      .text-main { font-family: 'EB Garamond', Garamond, 'Times New Roman', serif;
                   font-style: italic; font-weight: 500; fill: #1a1a1a; }
      .text-tag { font-family: 'Inter', system-ui, sans-serif; font-weight: 500;
                  fill: #8b6f1a; letter-spacing: 0.2em; text-transform: uppercase; }
    </style>
  </defs>

  <!-- Stockinette-stitch motif, 3 rows × 4 columns of V-stitches -->
  <g transform="translate(20, 30)">
    <!-- Each V is a stylized knit stitch -->
    <g class="yarn">
      <!-- Row 1 -->
      <path d="M 10 10 L 25 30 L 40 10" stroke="#8b1a1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 50 10 L 65 30 L 80 10" stroke="#8b1a1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 90 10 L 105 30 L 120 10" stroke="#8b1a1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Row 2 -->
      <path d="M 10 50 L 25 70 L 40 50" stroke="#8b1a1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 50 50 L 65 70 L 80 50" stroke="#8b1a1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 90 50 L 105 70 L 120 50" stroke="#8b1a1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Row 3 -->
      <path d="M 10 90 L 25 110 L 40 90" stroke="#8b1a1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 50 90 L 65 110 L 80 90" stroke="#8b1a1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 90 90 L 105 110 L 120 90" stroke="#8b1a1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Row 4 -->
      <path d="M 10 130 L 25 150 L 40 130" stroke="#8b1a1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 50 130 L 65 150 L 80 130" stroke="#8b1a1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 90 130 L 105 150 L 120 130" stroke="#8b1a1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="180" y="105" class="text-main" font-size="56">strikkeopskrift</text>
  <text x="183" y="135" class="text-tag" font-size="11">parametriske mønstre · valideret matematik</text>
</svg>
