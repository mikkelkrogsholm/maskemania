<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <style>
      .yarn-main { stroke: #6b3a8b; }
      .yarn-warm { stroke: #b8550c; }
      .text-main { font-family: 'EB Garamond', Garamond, 'Times New Roman', serif;
                   font-style: italic; font-weight: 500; fill: #1a1a1a; }
      .text-tag { font-family: 'Inter', system-ui, sans-serif; font-weight: 500;
                  fill: #6b3a8b; letter-spacing: 0.2em; text-transform: uppercase; }
    </style>
  </defs>

  <!-- Crochet-loop chain motif: a row of interlocked oval loops over a hook -->
  <g transform="translate(20, 50)" fill="none" stroke-width="4"
     stroke-linecap="round" stroke-linejoin="round">

    <!-- Foundation chain: 5 interlocking oval rings -->
    <g class="yarn-main">
      <ellipse cx="30"  cy="50" rx="18" ry="14"/>
      <ellipse cx="60"  cy="50" rx="18" ry="14"/>
      <ellipse cx="90"  cy="50" rx="18" ry="14"/>
      <ellipse cx="120" cy="50" rx="18" ry="14"/>
    </g>

    <!-- Hook: simplified crochet hook shape -->
    <g class="yarn-warm" stroke-width="3.5">
      <!-- Shaft -->
      <line x1="135" y1="20" x2="135" y2="92"/>
      <!-- Hook head: a small reverse-J curve -->
      <path d="M 135 20 Q 145 14 145 24 Q 145 32 137 32"/>
      <!-- Handle dot at base -->
      <circle cx="135" cy="98" r="3.5" fill="#b8550c" stroke="none"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="180" y="105" class="text-main" font-size="56">hækling</text>
  <text x="183" y="135" class="text-tag" font-size="11">parametriske mønstre · valideret matematik</text>
</svg>
