name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Unit tests (strikning + hækling)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # No third-party deps required for tests today, but install
          # from requirements files if/when they appear.
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run strikning unit tests
        run: python -m unittest discover -s skills/strikning/tests -v

      - name: Run hækling unit tests
        run: python -m unittest discover -s skills/hækling/tests -v

  smoke:
    name: CLI smoke tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Smoke — strikning hue (markdown)
        run: |
          python skills/strikning/scripts/generate.py \
            --format md hue \
            --head 56 --sts 22 --rows 30 \
            > /tmp/hue.md
          test -s /tmp/hue.md

      - name: Smoke — strikning raglan (markdown)
        run: |
          python skills/strikning/scripts/generate.py \
            --format md raglan \
            --bust 92 --sts 22 --rows 30 \
            > /tmp/raglan.md
          test -s /tmp/raglan.md

      - name: Smoke — hækling amigurumi (markdown)
        run: |
          python skills/hækling/scripts/generate.py \
            --format md amigurumi \
            --diameter 8 --gauge 5 \
            > /tmp/ami.md
          test -s /tmp/ami.md

      - name: Smoke — hækling granny (markdown)
        run: |
          python skills/hækling/scripts/generate.py \
            --format md granny --rounds 5 \
            > /tmp/granny.md
          test -s /tmp/granny.md
