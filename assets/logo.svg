<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" width="720" height="220">
  <defs>
    <style>
      .knit  { stroke: #8b1a1a; }
      .croc  { stroke: #6b3a8b; }
      .accent { stroke: #b8860b; }
      .text-main { font-family: 'EB Garamond', Garamond, 'Times New Roman', serif;
                   font-style: italic; font-weight: 500; fill: #1a1a1a; }
      .text-tag { font-family: 'Inter', system-ui, sans-serif; font-weight: 500;
                  fill: #5a3a1a; letter-spacing: 0.28em; text-transform: uppercase; }
    </style>
  </defs>

  <!-- Top motif: knit V-stitches transitioning to crochet chain loops.
       A single yarn line travels left-to-right, stockinette on the left,
       chain on the right — exactly what the project does. -->
  <g transform="translate(40, 28)" fill="none" stroke-width="4"
     stroke-linecap="round" stroke-linejoin="round">

    <!-- Stockinette grid (knit), 2 rows × 4 V's -->
    <g class="knit">
      <!-- Row 1 -->
      <path d="M 8 8   L 24 28  L 40 8"/>
      <path d="M 48 8  L 64 28  L 80 8"/>
      <path d="M 88 8  L 104 28 L 120 8"/>
      <path d="M 128 8 L 144 28 L 160 8"/>
      <!-- Row 2, offset 20 down -->
      <path d="M 8 32  L 24 52  L 40 32"/>
      <path d="M 48 32 L 64 52  L 80 32"/>
      <path d="M 88 32 L 104 52 L 120 32"/>
      <path d="M 128 32 L 144 52 L 160 32"/>
    </g>

    <!-- Connector: a single yarn strand emerging from the last knit V
         and flowing into the chain on the right. -->
    <path class="accent" d="M 160 32 C 180 32, 195 30, 210 30"/>

    <!-- Crochet chain loops (interlocked ovals) -->
    <g class="croc">
      <ellipse cx="232" cy="30" rx="22" ry="14"/>
      <ellipse cx="270" cy="30" rx="22" ry="14"/>
      <ellipse cx="308" cy="30" rx="22" ry="14"/>
      <ellipse cx="346" cy="30" rx="22" ry="14"/>
      <ellipse cx="384" cy="30" rx="22" ry="14"/>
    </g>

    <!-- Trailing yarn-end with a small tail -->
    <path class="accent" d="M 406 30 C 420 30, 432 22, 440 16"/>
  </g>

  <!-- Wordmark -->
  <text class="text-main" x="40" y="160" font-size="78">maskemania</text>

  <!-- Tagline -->
  <text class="text-tag" x="42" y="195" font-size="13">strik · hækl · maskemath</text>
</svg>
